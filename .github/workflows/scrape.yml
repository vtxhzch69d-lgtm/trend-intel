name: 트렌드 수집 및 분석

on:
  schedule:
    - cron: '0,30 * * * *'   # 매 30분마다
  workflow_dispatch:            # 수동 실행 가능

jobs:
  scrape-and-analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install httpx beautifulsoup4 lxml

      - name: 스크래핑 및 AI 분석
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python3 scripts/run_analysis.py

      - name: 결과 커밋
        run: |
          git config user.name "TrendIntel Bot"
          git config user.email "bot@trendintel.kr"
          git add data/
          git diff --staged --quiet || git commit -m "chore: 트렌드 리포트 업데이트 $(date '+%Y-%m-%d %H:%M')"
          git push
